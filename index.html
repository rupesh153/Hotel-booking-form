<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Booking</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form_background">
      <h2>Hotel Booking Form</h2>
      <form>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="john@example.com"
            required
          />
        </div>

        <div class="row">
          <div class="form-group">
            <label for="checkin">Check-in</label>
            <input type="date" id="checkin" name="checkin" required />
          </div>
          <div class="form-group">
            <label for="checkout">Check-out</label>
            <input type="date" id="checkout" name="checkout" required />
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="room-type">Room Type</label>
            <select id="room-type" name="room-type">
              <option value="standard">Standard(₹2000)</option>
              <option value="deluxe">Deluxe(₹3000)</option>
              <option value="suite">Executive Suite(₹5000)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="guests">Guests</label>
            <input
              type="number"
              id="guests"
              name="guests"
              min="1"
              max="5"
              value="1"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="requests">Special Requests</label>
          <textarea
            id="requests"
            name="requests"
            rows="3"
            placeholder="Dietary needs, high floor, etc."
          ></textarea>
        </div>
        <div class="summary">
          <h3>Booking Summary</h3>
          <p id="nights">Nights: 0</p>
          <p class="total" id="total">Total: ₹0</p>
        </div>

        <button type="submit">Book Now</button>
      </form>
      <!-- Custom Success Popup -->
<div id="successPopup" class="popup">
  <div class="popup-content">
    <h3>🎉 Booking Successful!</h3>
    <p>Thank you for booking with us.</p>
    <p>Our team will contact you soon.</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
